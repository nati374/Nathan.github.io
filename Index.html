<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Large Candle Flame and Spark</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .candle {
            position: relative;
            width: 40px; /* Increased width */
            height: 200px; /* Increased height */
            background-color: #fff;
            border-radius: 20px 20px 0 0; /* Adjusted border-radius */
        }

        .flame {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 30px; /* Increased width */
            height: 80px; /* Increased height */
            background-color: #ff5722;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 1.5s infinite alternate;
        }

        .spark {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 4px; /* Increased width */
            height: 20px; /* Increased height */
            background-color: #ffeb3b;
            opacity: 0;
            animation: spark 1.5s infinite;
        }

        @keyframes flicker {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                background-color: #ff5722;
            }
            50% {
                transform: translateX(-50%) scale(1.1);
                background-color: #ff9800;
            }
        }

        @keyframes spark {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(-40px); /* Adjusted distance */
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-80px); /* Adjusted distance */
            }
        }
    </style>
</head>
<body>
    <div class="candle">
        <div class="flame"></div>
        <div class="spark"></div>
    </div>
</body>
</html>
